image: node:20-alpine

cache:
  key:
    files:
      - package-lock.json
  paths:
    - node_modules/

pages:
  script:
    - npm ci --prefer-offline
    - VITE_BASE_URL="/${CI_PROJECT_NAME}/" npm run build
    - mv dist public
  artifacts:
    paths:
      - public
    expire_in: 1 hour
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
